<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTF-8 Art Editor</title>
    <!-- Configure Tailwind to use `class` strategy for dark mode so
         toggling the `dark` class on <body> will affect components. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="locale.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        };
    </script>
    <!-- custom fonts -->
    <!-- <link rel="preload" href="./resources/fonts/mona-subset.woff2?v=0.0.1" as="font" type="font/woff2"> -->
    <link rel="stylesheet" href="main.css">
</head>
<body class="dark bg-neutral-900 transition-colors duration-200 overflow-hidden h-screen flex items-center justify-center">
    <header class="fixed top-0 left-0 w-full z-40 flex items-center justify-between px-4 py-3 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
        <h1 class="text-xl font-bold tracking-tight text-white">UTF-8 Art Editor</h1>
        <nav>
            <a href="index.html" class="text-blue-600 dark:text-blue-400 hover:underline mr-4">Editor</a>
            <a href="about.html" class="text-gray-500 dark:text-gray-400 underline cursor-default">About</a>
        </nav>
    </header>

    <!-- Floating Top Bar -->
    <header id="floatingBar" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex flex-wrap gap-2 items-center p-2 rounded-xl border border-neutral-200 dark:border-neutral-700 bg-white/80 dark:bg-neutral-800/80 shadow-2xl floating-bar" style="cursor:move;">
        <!-- Grab Area with Visual Cue -->
        <div class="grab-area-hint flex items-center justify-center px-2 cursor-grab active:cursor-grabbing text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 transition-colors">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <circle cx="9" cy="6" r="1.5"/>
            <circle cx="9" cy="12" r="1.5"/>
            <circle cx="9" cy="18" r="1.5"/>
            <circle cx="15" cy="6" r="1.5"/>
            <circle cx="15" cy="12" r="1.5"/>
            <circle cx="15" cy="18" r="1.5"/>
            </svg>
        </div>

        <!-- File Menu -->
        <div class="relative group">
            <button class="px-3 py-1.5 hover:bg-neutral-100 dark:hover:bg-neutral-700 rounded-lg text-sm font-medium transition-colors text-neutral-800 dark:text-neutral-200">
                File
            </button>
            <div class="absolute top-full left-0 mt-1 w-48 bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                <button onclick="exportTxt()" class="w-full text-left px-4 py-2 text-sm hover:bg-neutral-100 dark:hover:bg-neutral-700 text-neutral-800 dark:text-neutral-200">Export .txt</button>
                <button onclick="exportImage()" class="w-full text-left px-4 py-2 text-sm hover:bg-neutral-100 dark:hover:bg-neutral-700 text-neutral-800 dark:text-neutral-200">Export Image</button>
                <button onclick="saveProject()" class="w-full text-left px-4 py-2 text-sm hover:bg-neutral-100 dark:hover:bg-neutral-700 text-neutral-800 dark:text-neutral-200">Save Project (.json)</button>
                <button onclick="openJsonModal()" class="w-full text-left px-4 py-2 text-sm hover:bg-neutral-100 dark:hover:bg-neutral-700 text-neutral-800 dark:text-neutral-200" data-i18n="copyPasteJson">Copy/Paste JSON</button>
                <hr class="border-neutral-200 dark:border-neutral-700">
                <label class="block w-full text-left px-4 py-2 text-sm hover:bg-neutral-100 dark:hover:bg-neutral-700 cursor-pointer text-neutral-800 dark:text-neutral-200">
                    Load File
                    <input type="file" id="fileInput" class="hidden" accept=".txt,.json" onchange="loadFile(event)">
                </label>
            </div>
        </div>

        <!-- Quick Save (Icon Only) -->
        <button onclick="manualSave()" class="p-1.5 hover:bg-neutral-100 dark:hover:bg-neutral-700 text-neutral-600 dark:text-neutral-400 hover:text-blue-600 dark:hover:text-blue-400 rounded-lg transition-all active:scale-95 group relative" title="Save Snapshot">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 4H16L20 8V20C20 20.55 19.55 21 19 21H5C4.45 21 4 20.55 4 20V5C4 4.45 4.45 4 5 4H8Z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 4V8H9V4" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21V13H17V21" />
            </svg>
        </button>

        <!-- Font Selector -->
        <select id="fontSelect" onchange="updateFont()" class="bg-white dark:bg-neutral-700 border-none text-sm px-2 py-1.5 focus:ring-0 cursor-pointer text-neutral-800 dark:text-neutral-200">
            <option value="'MS PGothic'">MS PGothic</option>
            <option value="monospace">Default Monospace</option>
            <!-- <option value="MonaSubset">Mona Subset</option> -->
            <option value="'Courier New', Courier, monospace">Courier New</option>
            <option value="'Lucida Console', Monaco, monospace">Lucida Console</option>
            <option value="'Consolas', 'Monaco', monospace">Consolas</option>
        </select>

        <!-- Divider -->
        <div class="h-6 w-px bg-neutral-300 dark:bg-neutral-600 mx-1"></div>

        <!-- Font Size -->
        <div class="flex items-center space-x-1">
            <label for="fontSize" class="text-xs font-bold text-neutral-800 dark:text-neutral-200">Size</label>
            <input type="number" id="fontSize" value="16" min="8" max="72" onchange="updateFont()" class="w-10 bg-transparent border-none text-sm px-2 py-1.5 focus:ring-0 text-neutral-800 dark:text-neutral-200 text-center [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" title="Font Size" style="-moz-appearance: textfield; appearance: textfield;">
        </div>

        <!-- Line Height -->
        <div class="flex items-center space-x-1">
            <label for="lineHeight" class="text-xs font-bold text-neutral-800 dark:text-neutral-200">Line H</label>
            <input type="number" id="lineHeight" value="1" min="0.5" max="3" step="0.05" onchange="updateFont()" class="w-10 bg-transparent border-none text-sm px-2 py-1.5 focus:ring-0 text-neutral-800 dark:text-neutral-200 text-center [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" title="Line Height" style="-moz-appearance: textfield; appearance: textfield;">
        </div>

        <!-- Divider -->
        <div class="h-6 w-px bg-neutral-300 dark:bg-neutral-600 mx-1"></div>

        <!-- Guide Position -->
        <div class="flex items-center space-x-1">
            <label for="guidePos" class="text-xs font-bold text-neutral-800 dark:text-neutral-200" data-i18n="guidePos">Guide (px)</label>
            <input type="number" id="guidePos" value="400" min="0" max="2000" step="10" oninput="updateGuide()" class="w-12 bg-transparent border-none text-sm px-2 py-1.5 focus:ring-0 text-neutral-800 dark:text-neutral-200 text-center [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" title="Guide Position" style="-moz-appearance: textfield; appearance: textfield;">
        </div>

        <!-- Max Length -->
        <div class="flex items-center space-x-1">
            <label for="maxLen" class="text-xs font-bold text-neutral-800 dark:text-neutral-200" data-i18n="maxLen">Max line chars</label>
            <input type="number" id="maxLen" value="80" min="0" max="1000" onchange="updateMaxLen()" class="w-10 bg-transparent border-none text-sm px-2 py-1.5 focus:ring-0 text-neutral-800 dark:text-neutral-200 text-center [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" title="Max Line Length" style="-moz-appearance: textfield; appearance: textfield;">
        </div>

        <!-- Divider -->
        <div class="h-6 w-px bg-neutral-300 dark:bg-neutral-600 mx-1"></div>

        <!-- Grid Settings -->
        <div class="flex items-center space-x-2">
            <button id="gridToggle" onclick="toggleGrid()" class="p-1.5 hover:bg-neutral-100 dark:hover:bg-neutral-700 rounded transition-colors text-neutral-800 dark:text-neutral-200" title="Toggle Grid Guide">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-11v18m4-18v18m-8-18v18"></path></svg>
            </button>
            <div class="flex items-center space-x-1">
                <label for="gridX" class="text-[10px] font-bold text-neutral-500 uppercase">X</label>
                <input type="number" id="gridX" value="20" min="5" max="200" oninput="updateGrid()" class="w-8 bg-transparent border-none text-xs px-1 py-1 focus:ring-0 text-neutral-800 dark:text-neutral-200 text-center [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" title="Grid X spacing" style="-moz-appearance: textfield; appearance: textfield;">
            </div>
            <div class="flex items-center space-x-1">
                <label for="gridY" class="text-[10px] font-bold text-neutral-500 uppercase">Y</label>
                <input type="number" id="gridY" value="20" min="5" max="200" oninput="updateGrid()" class="w-8 bg-transparent border-none text-xs px-1 py-1 focus:ring-0 text-neutral-800 dark:text-neutral-200 text-center [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" title="Grid Y spacing" style="-moz-appearance: textfield; appearance: textfield;">
            </div>
        </div>

        <!-- Divider -->
        <div class="h-6 w-px bg-neutral-300 dark:bg-neutral-600 mx-1"></div>

        <!-- Theme Toggle -->
        <button onclick="toggleTheme()" class="p-2 hover:bg-neutral-100 dark:hover:bg-neutral-700 rounded-lg transition-colors text-neutral-800 dark:text-neutral-200" title="Toggle Light/Dark Mode">
            <svg id="sun-icon" class="hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path></svg>
            <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>

        <!-- Background Image Toggle -->
        <button onclick="openBgModal()" class="p-2 hover:bg-neutral-100 dark:hover:bg-neutral-700 rounded-lg transition-colors text-neutral-800 dark:text-neutral-200" title="Set Background Image">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        </button>
    </header>

    <!-- Background Image Modal -->
    <div id="bgModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 hidden backdrop-blur-sm">
        <div class="bg-white dark:bg-neutral-800 rounded-2xl shadow-2xl p-6 w-full max-w-md border border-neutral-200 dark:border-neutral-700">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-neutral-800 dark:text-neutral-100">Background Settings</h3>
                <button onclick="closeBgModal()" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="space-y-4">
                <!-- File Selection -->
                <div>
                    <label class="block text-sm font-medium text-neutral-700 dark:text-neutral-300 mb-1">Select Image</label>
                    <input type="file" id="bgInput" accept="image/*" onchange="handleBgUpload(event)" class="block w-full text-sm text-neutral-500 dark:text-neutral-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 dark:file:bg-blue-900/30 dark:file:text-blue-300">
                </div>

                <!-- Preview Area -->
                <div class="relative w-full h-32 bg-neutral-100 dark:bg-neutral-700 rounded-lg overflow-hidden border border-dashed border-neutral-300 dark:border-neutral-600 flex items-center justify-center">
                    <div id="bgPreview" class="absolute inset-0 bg-contain bg-center bg-no-repeat transition-all"></div>
                    <span id="bgPreviewPlaceholder" class="text-xs text-neutral-400">No image selected</span>
                    <div class="z-10 text-[6px] leading-[6px] font-mono text-neutral-400 pointer-events-none opacity-30 select-none">
                    </div>
                </div>

                <!-- Controls -->
                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-xs font-bold text-neutral-600 dark:text-neutral-400">Opacity</label>
                            <span id="opacityVal" class="text-xs text-neutral-500">50%</span>
                        </div>
                        <input type="range" id="bgOpacity" min="0" max="1" step="0.01" value="0.5" oninput="updateBgPreview()" class="w-full h-2 bg-neutral-200 dark:bg-neutral-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-xs font-bold text-neutral-600 dark:text-neutral-400">Scale</label>
                            <span id="scaleVal" class="text-xs text-neutral-500">100%</span>
                        </div>
                        <input type="range" id="bgScale" min="10" max="300" value="100" oninput="updateBgPreview()" class="w-full h-2 bg-neutral-200 dark:bg-neutral-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-xs font-bold text-neutral-600 dark:text-neutral-400">Pos X</label>
                                <span id="posXVal" class="text-xs text-neutral-500">50%</span>
                            </div>
                            <input type="range" id="bgPosX" min="0" max="100" value="50" oninput="updateBgPreview()" class="w-full h-2 bg-neutral-200 dark:bg-neutral-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                        </div>
                        <div>
                            <div class="flex justify-between mb-1">
                                <label class="text-xs font-bold text-neutral-600 dark:text-neutral-400">Pos Y</label>
                                <span id="posYVal" class="text-xs text-neutral-500">50%</span>
                            </div>
                            <input type="range" id="bgPosY" min="0" max="100" value="50" oninput="updateBgPreview()" class="w-full h-2 bg-neutral-200 dark:bg-neutral-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="clearBg()" class="flex-1 px-4 py-2 border border-neutral-200 dark:border-neutral-700 rounded-lg text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">Clear</button>
                    <button onclick="applyBgSettings()" class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors shadow-lg shadow-blue-500/30">Apply</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JSON Modal -->
    <div id="jsonModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 hidden backdrop-blur-sm">
        <div class="bg-white dark:bg-neutral-800 rounded-2xl shadow-2xl p-6 w-full max-w-2xl border border-neutral-200 dark:border-neutral-700">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-neutral-800 dark:text-neutral-100" data-i18n="jsonModalTitle">Copy/Paste Project JSON</h3>
                <button onclick="closeJsonModal()" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <p class="text-xs text-neutral-500 dark:text-neutral-400 mb-2" data-i18n="jsonModalDesc">View, copy, or paste your project data in JSON format.</p>
                    <textarea id="jsonTextArea" class="w-full h-80 p-3 font-mono text-xs bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-neutral-800 dark:text-neutral-200 resize-none" placeholder="Paste JSON here..."></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="copyJsonToClipboard()" id="copyJsonBtn" class="flex-1 px-4 py-2 border border-neutral-200 dark:border-neutral-700 rounded-lg text-sm font-medium text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-colors" data-i18n="copyToClipboard">Copy to Clipboard</button>
                    <button onclick="applyJsonFromTextarea()" class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors shadow-lg shadow-blue-500/30" data-i18n="applyJson">Apply JSON</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Editor Container -->
    <main class="w-full h-full flex items-center justify-center p-8 pt-20">
        <!-- Visual Wrapper (Artificial Padding) -->
        <div id="editorVisualContainer" class="w-full max-w-[80vw] h-full max-h-[80vh] bg-white dark:bg-neutral-800 rounded-2xl shadow-2xl border border-neutral-200 dark:border-neutral-700 p-6 overflow-hidden flex flex-col transition-colors duration-300">
            <div class="w-full h-full relative">
                <!-- Visual Guide Rule -->
                <div id="guideRule" class="absolute top-0 bottom-0 w-px bg-red-500/30 dark:bg-red-400/30 z-20 pointer-events-none transition-all hidden" style="left: 400px;"></div>

                <!-- Background Layer -->
                <div id="editorBgLayer" class="absolute inset-0 z-0 pointer-events-none bg-no-repeat rounded-lg opacity-0" style="padding: 0; background-origin: padding-box;"></div>
                
                <!-- Grid Layer -->
                <div id="gridLayer" class="absolute inset-0 z-[1] pointer-events-none rounded-lg hidden"></div>

                <textarea id="editor" spellcheck="false" placeholder="Start your UTF-8 art here..." 
                    class="w-full h-full p-0 bg-transparent text-neutral-900 dark:text-neutral-100 focus:outline-none focus:ring-0 transition-all resize-none relative z-10"></textarea>
            </div>
        </div>
    </main>

    <!-- Side Palette for rare symbols -->
    <div id="symbolPalette" class="fixed right-4 top-1/2 -translate-y-1/2 flex flex-col gap-2 p-3 bg-white/80 dark:bg-neutral-800/80 border border-neutral-200 dark:border-neutral-700 rounded-xl shadow-xl floating-bar max-h-[70vh] overflow-y-auto">
        <button onclick="openSymbolGallery()" class="p-2 flex items-center justify-center text-blue-600 dark:text-blue-400 hover:bg-neutral-100 dark:hover:bg-neutral-700 rounded-lg transition-colors overflow-hidden" title="Show All" data-i18n-title="showAllSymbols">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
            </svg>
        </button>
        <hr class="border-neutral-200 dark:border-neutral-700 my-1">
        <div id="palette-buttons" class="flex flex-col gap-2">
            <!-- Symbols will be injected here -->
        </div>
    </div>

    <!-- Symbol Gallery Modal -->
    <div id="symbolGalleryModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="bg-white dark:bg-neutral-800 rounded-2xl shadow-2xl w-full max-w-2xl border border-neutral-200 dark:border-neutral-700 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-neutral-200 dark:border-neutral-700 flex justify-between items-center bg-neutral-50 dark:bg-neutral-900/50">
                <h3 class="font-bold text-neutral-800 dark:text-neutral-100" data-i18n="symbolGalleryTitle">Symbol Gallery</h3>
                <button onclick="closeSymbolGallery()" class="p-2 hover:bg-neutral-200 dark:hover:bg-neutral-700 rounded-full transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div id="symbolGalleryGrid" class="p-6 overflow-y-auto grid grid-cols-6 sm:grid-cols-8 md:grid-cols-10 gap-2">
                <!-- All symbols will be injected here -->
            </div>

            <div class="p-4 border-t border-neutral-200 dark:border-neutral-700 flex justify-end bg-neutral-50 dark:bg-neutral-900/50">
                <button onclick="closeSymbolGallery()" class="px-4 py-2 bg-neutral-200 dark:bg-neutral-700 hover:bg-neutral-300 dark:hover:bg-neutral-600 rounded-lg text-sm font-bold transition-colors" data-i18n="close">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="fixed bottom-2 left-1/2 -translate-x-1/2 z-40 text-xs text-neutral-500 dark:text-neutral-400 bg-white/80 dark:bg-neutral-800/80 px-4 py-2 rounded-lg shadow border border-neutral-200 dark:border-neutral-700 flex items-center gap-2">
        <span id="byteCounter" class="border-r border-neutral-300 dark:border-neutral-600 pr-2">0 Bytes</span>
        <span>&copy; <span id="footer-year"></span> UTF-8 Art Editor &mdash; </span>
        <a href="./about.html" class="underline hover:text-blue-600 dark:hover:text-blue-400">About</a>
    </footer>

    <div id="savingIndicator" class="fixed bottom-4 left-4 bg-yellow-100 text-yellow-800 px-3 py-1 rounded-lg shadow-md border border-yellow-300 flex items-center gap-2 opacity-0 transition-opacity transition-colors pointer-events-none">
        <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m0 16v1m8-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <span class="text-sm">Saving...</span>
    </div>

    <span style="bottom: 0; right: 10px; position: absolute;" class="mb-4 ml-4">
        <a href="https://hits.sh/davidljz.github.io/utf8-jis-art-editor/"><img alt="Hits" src="https://hits.sh/davidljz.github.io/utf8-jis-art-editor.svg"/></a>
    </span>

    <script src="main.js"></script>
</body>
</html>
